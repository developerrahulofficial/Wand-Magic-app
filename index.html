<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic metadata for the magic wand reveal project -->
  <meta charset="UTF-8">
  <title>Magic Wand Reveal</title>
  <!-- FontAwesome for placeholder icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- Main stylesheet for visual effects and layout -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- The magic wand element that follows the cursor -->
  <div id="wand">
    <div class="cap"></div>
  </div>

  <!-- Container for the interactive tiles -->
  <div id="tiles">
    <!-- Each tile contains a placeholder icon and an image revealed by the wand -->
    <div class="tile">
      <i class="fa-solid fa-image"></i>
      <img
        src="https://assets.codepen.io/1468070/edgar-infocus-eCSsB3sIEHs-unsplash.jpg?width=1000&height=1250&format=auto&quality=70" />
    </div>
    <div class="tile">
      <i class="fa-solid fa-image"></i>
      <img
        src="https://assets.codepen.io/1468070/eugene-golovesov-ItyV8UzZzzw-unsplash.jpg?width=818&height=1228&format=auto&quality=80" />
    </div>
    <div class="tile">
      <i class="fa-solid fa-image"></i>
      <img
        src="https://assets.codepen.io/1468070/alex-shuper-3OpOV8ntLj4-unsplash.jpg?width=1000&height=1500&format=auto&quality=80" />
    </div>
  </div>
  <!-- External utility scripts and local functionality script -->

  <script src="./script.js"></script>

</body>

</html>
